<!DOCTYPE html>
<html>
<head>
    <title>Making of a Google Form</title>
</head>

<body align="center">

    <h1>Form to be filled by <i>Interns</i></h1>
    <h3>Details of <u>Student</u></h3>

    <form>

        <label>Name of Student:</label>
        <input type="text" maxlength="20" placeholder="Enter Name">
        <br><br>

        <label>Course:</label>
        <input type="text" maxlength="10" placeholder="Name of Course">
        <br><br>

        <label>Name of College:</label>
        <input type="text" maxlength="20" placeholder="Name of College">
        <br><br>

        <label>Contact:</label> +91
        <input type="tel" placeholder="Enter Phone No.">
        <br><br>

        <label>Gender:</label>
        <select>
            <option value="">-- Select Gender --</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
            <option value="prefer_not_to_say">Prefer Not to Say</option>
        </select>

        <br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
