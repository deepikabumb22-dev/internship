<!DOCTYPE html>
<html>
<head>
    <title>School Timetable</title>
</head>
<body>

    <h2>School Timetable</h2>

    <table border="1">
        <tr>
            <th>Day</th>
            <th>9:00-10:00</th>
            <th>10:00-11:00</th>
            <th>11:00-11:15</th>
            <th>11:15-12:15</th>
            <th>12:15-1:00</th>
            <th>1:00-2:00</th>
        </tr>

        <tr>
            <td>Monday</td>
            <td>Math</td>
            <td>English</td>
            <td rowspan="5">Break</td>
            <td>Science</td>
            <td rowspan="5">Lunch</td>
            <td>Computer</td>
        </tr>

        <tr>
            <td>Tuesday</td>
            <td>Science</td>
            <td>Math</td>
            <td>English</td>
            <td>History</td>
        </tr>

        <tr>
            <td>Wednesday</td>
            <td>English</td>
            <td>Computer</td>
            <td>Math</td>
            <td>Science</td>
        </tr>

        <tr>
            <td>Thursday</td>
            <td>History</td>
            <td>Science</td>
            <td>Computer</td>
            <td>Math</td>
        </tr>

        <tr>
            <td>Friday</td>
            <td>Math</td>
            <td>English</td>
            <td>Science</td>
            <td>Art</td>
        </tr>
    </table>

</body>
</html>
