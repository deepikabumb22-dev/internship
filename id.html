
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Attributes Example</title>
</head>
<body>

    <h1 id="heading" class="title" style="color: rgb(94, 128, 0);">
        Welcome to HTML
    </h1>

    <p title="welcome to web" style="color: blue;" align="left">
        This paragraph uses multiple attributes.
    </p>

    <a href="https://www.flipkart.com" target="_blank" title="Visit flipkart">
        Open flipkart
    </a>

    <br><br>

    <img src="https://via.placeholder.com/200"
         alt="Sample Image"
         width="200"
         height="150"
         title="Placeholder Image">

    <br><br>

    <input type="text"
           placeholder="Enter your name"
           maxlength="20"
           required>

</body>
</html>
