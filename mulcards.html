<!DOCTYPE html>
<html>
<head>
    <title>Product Cards</title>

</head>
<body>
    <div class="card-container">
        <div class="card">
            <a href="https://media.wired.com/photos/68aea51ae01ba6cc5812ffcd/4:3/w_640%2Cc_limit/Google%2520Pixel%252010%2520Series%2520SOURCE%2520Julian%2520Chokkattu(1).png" target="_blank">

            </a>
            <p>Smartphones</p>
        </div>
        <div class="card">
            <a href="https://gourban.in/cdn/shop/files/Pulse.jpg?v=1749553994&width=2048" target="_blank">
                <img src="https://gourban.in/cdn/shop/files/Pulse.jpg?v=1749553994&width=2048" alt="Smartwatch">

            <p>Smart Watches</p>
        </div>
        <div class="card">
            <a href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTndMcJW71HLgi9ntgoterJiJJjLxbtOVVpyA&s" target="_blank">

            </a>

        <div class="card">
            <a href="https://cdn.thewirecutter.com/wp-content/media/2025/12/BEST-MIRRORLESS-CAMERAS-CANONR6II-2048PX-026.jpg?width=2048&quality=60&crop=2048:1365&auto=webp" target="_blank">
                <img src="https://cdn.thewirecutter.com/wp-content/media/2025/12/BEST-MIRRORLESS-CAMERAS-CANONR6II-2048PX-026.jpg?width=2048&quality=60&crop=2048:1365&auto=webp" alt="Camera">
            </a>
            <p>Digital Cameras</p>
        </div>
