<!DOCTYPE html>
<html>
<head>
    <title>Product Card</title>
    <style>
        .card {
            width: 250px;
            margin: 20px auto;
            padding: 15px;
            border: 2px solid gray;
            border-radius: 10px;
            background-color: lightyellow;
            text-align: center;
            box-shadow: 2px 2px 5px gray;
        }

        .card img {
            width: 150px;
            height: 150px;
        }

        .price {
            color: rgb(43, 169, 227);
            font-weight: bold;
        }

        .btn {
            background-color: rgb(230, 173, 177);
            padding: 8px;
            border: 1px solid rgb(255, 0, 0);
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://m.media-amazon.com/images/I/61iw9q2FAVL.jpg" alt="Product">
        <h2>Wireless Mouse</h2>
        <p>Comfortable and easy to use.</p>
        <p class="price">₹499</p>
        <button class="btn">Buy Now</button>
    </div>

</body>
</html>
